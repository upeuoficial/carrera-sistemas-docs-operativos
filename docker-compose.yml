services:
  mkdocs:
    image: python:3.12-slim
    container_name: mkdocs_linea_software
    working_dir: /docs
    volumes:
      - ./:/docs
    ports:
      - "8000:8000"
    environment:
      - WATCHFILES_FORCE_POLLING=true
    command: >
      sh -c "
      pip install --no-cache-dir mkdocs mkdocs-material pymdown-extensions &&
      mkdocs serve -a 0.0.0.0:8000 --livereload --watch docs --dirtyreload
      "